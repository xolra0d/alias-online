apiVersion: v1
kind: ConfigMap
metadata:
  name: alias-config
  namespace: alias-online
data:
  ALLOWED_ORIGINS: "https://alias.example.com"
  WS_ORIGIN_PATTERNS: "alias.example.com"
  JWT_COOKIE_SECURE: "true"
  JWT_COOKIE_DOMAIN: "alias.example.com"
  JWT_COOKIE_PATH: "/"
  JWT_COOKIE_HTTP_ONLY: "true"

  # gRPC service discovery + client-side round-robin (dns:/// + round_robin)
  AUTH_URL_GATEWAY: "dns:///auth-grpc.alias-online.svc.cluster.local:8090"
  VOCABS_URL_GATEWAY: "dns:///vocab-manager-grpc.alias-online.svc.cluster.local:8070"
  ROOM_MANAGER_URL_GATEWAY: "dns:///room-manager-grpc.alias-online.svc.cluster.local:8060"
  ROOM_MANAGER_URL: "dns:///room-manager-grpc.alias-online.svc.cluster.local:8060"
  VOCAB_MANAGER_URL: "dns:///vocab-manager-grpc.alias-online.svc.cluster.local:8070"

  REDIS_ADDR: "redis.alias-online.svc.cluster.local:6379"
  REDIS_USERNAME: ""
  REDIS_DB: "0"

  MAX_MESSAGES_PER_SECOND: "50"
  WORKER_POLL_INTERVAL: "10"
  WORKERS_POLL_INTERVAL: "10"
  WORKER_EXPIRY: "30"
---
apiVersion: v1
kind: Secret
metadata:
  name: alias-secrets
  namespace: alias-online
type: Opaque
stringData:
  # Example: postgres://alias:password@postgres.alias-online.svc.cluster.local:5432/alias?sslmode=disable
  POSTGRES_URL: ""
  POSTGRES_PASSWORD: ""
  REDIS_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-keys
  namespace: alias-online
type: Opaque
stringData:
  private.pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_REAL_PRIVATE_KEY
    -----END PRIVATE KEY-----
  public.pem: |
    -----BEGIN PUBLIC KEY-----
    REPLACE_WITH_REAL_PUBLIC_KEY
    -----END PUBLIC KEY-----
