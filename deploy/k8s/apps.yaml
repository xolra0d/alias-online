apiVersion: apps/v1
kind: Deployment
metadata:
  name: room-worker
  namespace: alias-online
spec:
  replicas: 2
  selector:
    matchLabels:
      app: room-worker
  template:
    metadata:
      labels:
        app: room-worker
    spec:
      containers:
        - name: room-worker
          image: ghcr.io/xolra0d/alias-room-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: alias-config
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: alias-secrets
                  key: POSTGRES_URL
            - name: JWT_PUBLIC_KEY_PATH
              value: /keys/public.pem
            - name: RUNNING_ADDR
              value: :8050
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: WORKER_PUBLIC_ADDR
              value: $(POD_IP):8050
          ports:
            - containerPort: 8050
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/ok
              port: 8050
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/ok
              port: 8050
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: main
  namespace: alias-online
spec:
  replicas: 3
  selector:
    matchLabels:
      app: main
  template:
    metadata:
      labels:
        app: main
    spec:
      containers:
        - name: main
          image: ghcr.io/xolra0d/alias-main:latest
          imagePullPolicy: IfNotPresent
