apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: alias-online
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: ghcr.io/xolra0d/alias-auth:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: alias-secrets
                  key: POSTGRES_URL
            - name: RSA_PRIVATE_KEY_FILENAME
              value: /keys/private.pem
            - name: RUNNING_ADDR
              value: :8090
          ports:
            - containerPort: 8090
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8090
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: jwt-keys
          secret:
            secretName: jwt-keys
---
apiVersion: v1
kind: Service
metadata:
  name: auth-grpc
  namespace: alias-online
spec:
  selector:
    app: auth
  ports:
    - name: grpc
      port: 8090
      targetPort: 8090
---
