                name: alias-config
          env:
            - name: JWT_PUBLIC_KEY_PATH
              value: /keys/public.pem
            - name: RUNNING_ADDR
              value: :8080
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: jwt-keys
              mountPath: /keys
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/ok
              port: 8080
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/ok
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: jwt-keys
          secret:
