apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alias-ingress
  namespace: alias-online
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: alias.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: main-http
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-http
                port:
                  number: 80
