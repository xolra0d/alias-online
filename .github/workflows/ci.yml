name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  backend-checks:
    name: Backend checks (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - backend/services/auth
          - backend/services/main
          - backend/services/room_manager
          - backend/services/room_worker
          - backend/services/vocab_manager
          - backend/shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum
      - name: gofmt
        working-directory: ${{ matrix.module }}
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: go test
        working-directory: ${{ matrix.module }}
        run: go test ./...
